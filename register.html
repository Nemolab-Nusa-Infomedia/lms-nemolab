<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://kit.fontawesome.com/yourcode.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
        body{
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom right, #FAA907, #FF7700);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 450px;
            /* height: 490px; */
            padding: 2.7rem 3rem;
            gap: 25px;
        }
        form input{
            width: 100%;
            border-radius: 11px;
            padding: 4.8px 0 4.8px 2.6rem;
            border: 2px solid gray;
        }
        form input::placeholder{
            font-weight: 400;
            font-size: .9rem;
        }
        form input:focus,
        form label:active {
            border: 2px solid #FAA907;
            outline: none;
        }
        .ikon{
            position: absolute;
            top: 6px;
            left: 8px;
            width: 27px;
            height: 27px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgb(235, 235, 235);
            padding: 5px;
            border-radius: 6px;
        }
        .eye{
            position: absolute;
            top: 7px;
            right: 15px;
            cursor: pointer;
        }
        .file-input {
            opacity: 0;
            position: absolute;
            z-index: -1;
        }
        .file-label {
            width: 100%;
            border-radius: 11px;
            text-align: left;
            padding: 4.8px 0 4.8px 2.6rem;
            border: 2px solid gray;
            box-sizing: border-box;
            cursor: pointer;
        }
        .file-label::after {
            /* font-weight: 400; */
            font-size: .9rem;
            content: attr(data-placeholder);
        }
        .btn{
            border-radius: 10px;
            background: #FAA907;
        }
        .btn:hover,
        .btn:active,
        .btn:focus {
            background: #FF7700;
        }
        </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-12 d-flex justify-content-center">
                <div class="box rounded-5 bg-white text-center d-flex flex-column justify-content-center shadow-lg">
                    <div>
                        <img src="img/logo.png" alt="logo" width="130">
                    </div>
                    <div>
                        <img src="https://encrypted-tbn3.gstatic.com/images?q=tbn:ANd9GcQudfLLk1p5Z0HecLq3BENiUzI46TSBa3am0OU37r2mmppighAg" alt="avatar" width="105" height="105" style="border-radius: 50%; object-fit: cover;">
                    </div>
                    <form action="">   
                        <div class="input-col position-relative">
                            <input type="email" placeholder="Name">
                            <span class="ikon"><img src="img/user.png" width="16"></span>
                        </div>
                        <div class="input-col position-relative mt-2">
                            <input type="file" id="fileInput" class="file-input" onchange="updateFileName()">
                            <label for="fileInput" class="file-label" data-placeholder="Choose avatar"></label>
                            <span class="ikon"><img src="img/avatar.png" width="16"></span>
                        </div>
                        <div class="input-col position-relative mt-2">
                            <input type="email" placeholder="Email address">
                            <span class="ikon"><img src="img/email.png" width="16"></span>
                        </div>
                        <div class="input-col position-relative mt-2">
                            <input type="password" placeholder="Password" id="password">
                            <span class="ikon"><img src="img/password.png" width="16"></span>
                            <span class="eye"><img src="img/eye.png" width="20" class="pass-icon" id="pass-icon" onclick="pass()"></span>
                        </div>
                    </form>
                    <div class="d-grid gap-2">
                        <button class="btn text-white fw-semibold">Continue</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        // input password
        var a;
        function pass(){
            if(a==1) {
                document.getElementById('password').type='password';
                document.getElementById('pass-icon').src='img/eye.png';
                a=0;
            } else {
                document.getElementById('password').type='text';
                document.getElementById('pass-icon').src='img/hidden.png';
                a=1;
            }
        }
        // input file
        function updateFileName() {
            const input = document.getElementById('fileInput');
            const label = input.nextElementSibling;
            const fileName = input.files[0] ? input.files[0].name : 'Choose avatar';
            label.setAttribute('data-placeholder', fileName);
        }
    </script> 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
