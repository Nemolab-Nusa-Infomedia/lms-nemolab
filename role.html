<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
        body{
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #FAA907, #FF7700);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 440px;
            height: 450px;
            padding: 0 3.2rem;
            gap: 30px;
            box-shadow: 2px 7px 4px -2px rgb(0,0,0,.1);
        }
        .btn{
            border-radius: 10px;
            background: #FAA907;
        }
        .btn:hover,
        .btn:active,
        .btn:focus {
            background: #FF7700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-12 d-flex justify-content-center">
                <div class="box rounded-5 bg-white text-center d-flex flex-column justify-content-center shadow-lg">
                    <div>
                        <img src="img/logo.png" alt="logo" width="130">
                    </div>
                    <h3 class="fw-bold">Tentukan Role Anda</h3>
                    <div class="d-grid gap-2">
                        <button class="btn text-white fw-semibold">Member</button>
                        <button class="btn text-white fw-semibold">Mentor</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
